name: steam-upload

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Steam App ID'
        required: true
        type: string
      depot_windows:
        description: 'Steam Depot ID for Windows'
        required: true
        type: string
      depot_macos:
        description: 'Steam Depot ID for macOS'
        required: true
        type: string
      depot_linux:
        description: 'Steam Depot ID for Linux'
        required: true
        type: string
      branch:
        description: 'Steam branch (default, beta, etc.)'
        required: true
        default: default
        type: string
      desc:
        description: 'Build description in Steam'
        required: true
        default: 'GitHub Actions build'
        type: string
      steam_guard_code:
        description: 'Steam Guard code (if required)'
        required: false
        type: string

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build app
        run: npx tauri build --bundles app

      - name: Collect Steam content (Windows)
        if: matrix.platform.name == 'windows'
        shell: bash
        run: |
          mkdir -p steam-content/windows
          cp src-tauri/target/release/app.exe steam-content/windows/

      - name: Collect Steam content (macOS)
        if: matrix.platform.name == 'macos'
        shell: bash
        run: |
          mkdir -p steam-content/macos
          cp -R src-tauri/target/release/bundle/macos/steamimageexporter.app steam-content/macos/

      - name: Collect Steam content (Linux)
        if: matrix.platform.name == 'linux'
        shell: bash
        run: |
          mkdir -p steam-content/linux
          cp src-tauri/target/release/app steam-content/linux/
          chmod +x steam-content/linux/app

      - name: Upload Steam content artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-content-${{ matrix.platform.name }}
          path: steam-content
          if-no-files-found: error

  upload:
    name: Upload to SteamPipe
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download Steam content artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: steam-content-*
          path: steam-content
          merge-multiple: true

      - name: Install SteamCMD
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          mkdir -p "$HOME/steamcmd"
          cd "$HOME/steamcmd"
          wget -q https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
          tar -xzf steamcmd_linux.tar.gz

      - name: Generate SteamPipe scripts
        shell: bash
        run: |
          mkdir -p steam/scripts
          cat > steam/scripts/depot_windows.vdf <<EOF
          "DepotBuildConfig"
          {
            "DepotID" "${{ inputs.depot_windows }}"
            "ContentRoot" "${{ github.workspace }}/steam-content/windows"
            "FileMapping"
            {
              "LocalPath" "*"
              "DepotPath" "."
              "recursive" "1"
            }
          }
          EOF

          cat > steam/scripts/depot_macos.vdf <<EOF
          "DepotBuildConfig"
          {
            "DepotID" "${{ inputs.depot_macos }}"
            "ContentRoot" "${{ github.workspace }}/steam-content/macos"
            "FileMapping"
            {
              "LocalPath" "*"
              "DepotPath" "."
              "recursive" "1"
            }
          }
          EOF

          cat > steam/scripts/depot_linux.vdf <<EOF
          "DepotBuildConfig"
          {
            "DepotID" "${{ inputs.depot_linux }}"
            "ContentRoot" "${{ github.workspace }}/steam-content/linux"
            "FileMapping"
            {
              "LocalPath" "*"
              "DepotPath" "."
              "recursive" "1"
            }
          }
          EOF

          cat > steam/scripts/app_build.vdf <<EOF
          "AppBuild"
          {
            "AppID" "${{ inputs.app_id }}"
            "Desc" "${{ inputs.desc }}"
            "BuildOutput" "${{ github.workspace }}/steam/build_output"
            "ContentRoot" "${{ github.workspace }}/steam-content"
            "SetLive" "${{ inputs.branch }}"
            "Depots"
            {
              "${{ inputs.depot_windows }}" "${{ github.workspace }}/steam/scripts/depot_windows.vdf"
              "${{ inputs.depot_macos }}" "${{ github.workspace }}/steam/scripts/depot_macos.vdf"
              "${{ inputs.depot_linux }}" "${{ github.workspace }}/steam/scripts/depot_linux.vdf"
            }
          }
          EOF

      - name: Upload build to Steam
        shell: bash
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_GUARD_CODE: ${{ inputs.steam_guard_code }}
        run: |
          if [ -z "$STEAM_USERNAME" ] || [ -z "$STEAM_PASSWORD" ]; then
            echo "STEAM_USERNAME and STEAM_PASSWORD secrets are required."
            exit 1
          fi

          if [ -n "$STEAM_GUARD_CODE" ]; then
            "$HOME/steamcmd/steamcmd.sh" \
              +login "$STEAM_USERNAME" "$STEAM_PASSWORD" "$STEAM_GUARD_CODE" \
              +run_app_build "${{ github.workspace }}/steam/scripts/app_build.vdf" \
              +quit
          else
            "$HOME/steamcmd/steamcmd.sh" \
              +login "$STEAM_USERNAME" "$STEAM_PASSWORD" \
              +run_app_build "${{ github.workspace }}/steam/scripts/app_build.vdf" \
              +quit
          fi

      - name: Upload Steam build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steam-build-logs
          path: steam/build_output
          if-no-files-found: ignore
